<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>🌷About</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<!-- NAVIGATION -->
<nav class="bg-white/30 backdrop-blur-md shadow-lg mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">

        <h1 class="text-2xl font-extrabold text-white tracking-widest drop-shadow">
            🍭 About
        </h1>

        <a th:href="@{/}"
           class="text-white font-semibold hover:text-pink-100
                  transition duration-300">
            ← Home
        </a>

    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 pb-20">

    <div class="bg-white/80 backdrop-blur-md
                rounded-3xl shadow-2xl p-12
                border-l-8 border-pink-400">

        <!-- App Name -->
        <h1 class="text-4xl font-extrabold text-pink-600"
            th:text="${appName}">
            App Name
        </h1>

        <!-- Info -->
        <p class="mt-6 text-lg text-pink-400">
            <strong class="text-pink-500">Version:</strong>
            <span class="text-pink-600 font-semibold ml-2"
                  th:text="${version}"></span>
        </p>

        <p class="mt-3 text-lg text-pink-400">
            <strong class="text-pink-500">Author:</strong>
            <span class="text-pink-600 font-semibold ml-2"
                  th:text="${author}"></span>
        </p>

        <!-- Technologies -->
        <h3 class="mt-10 text-2xl font-bold text-pink-600">
            Technologies Used:
        </h3>

        <ul class="mt-6 space-y-4">
            <li class="bg-pink-100 text-pink-600
                       px-6 py-3 rounded-full
                       font-semibold shadow-md
                       hover:bg-pink-200 transition duration-300"
                th:each="tech : ${technologies}"
                th:text="${tech}">
                Technology
            </li>
        </ul>

        <!-- Button -->
        <a th:href="@{/}"
           class="inline-block mt-12
                  bg-gradient-to-r from-pink-500 to-fuchsia-500
                  text-white font-bold px-8 py-3
                  rounded-full shadow-lg
                  hover:shadow-2xl hover:scale-105
                  transition duration-300">
            ← Back to Home
        </a>

    </div>

</div>

</body>
</html>
