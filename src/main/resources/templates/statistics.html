<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">📊Statistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="max-w-6xl mx-auto mt-20 px-6 pb-20">

    <div class="bg-white/80 backdrop-blur-md
                rounded-3xl shadow-2xl p-14
                border-l-8 border-pink-400">

        <!-- Title -->
        <h2 class="text-4xl font-extrabold text-pink-600 mb-8">
            📊 Statistik Produk
        </h2>

        <!-- Total Product Card -->
        <div class="bg-pink-100 rounded-2xl p-6 shadow-md mb-10 text-center">
            <p class="text-pink-500 text-lg font-semibold">
                Total Produk
            </p>
            <p class="text-5xl font-extrabold text-fuchsia-600 mt-2"
               th:text="${totalProducts}">
            </p>
        </div>

        <!-- Total Per Category -->
        <h5 class="text-2xl font-bold text-pink-600 mb-4">
            Total Per Kategori
        </h5>

        <div class="grid md:grid-cols-2 gap-4 mb-12">
            <div class="bg-pink-50 text-pink-600
                        px-6 py-4 rounded-2xl shadow-md font-semibold"
                 th:each="entry : ${totalPerCategory}">
                <span th:text="${entry.key}"></span> :
                <span class="font-bold ml-2"
                      th:text="${entry.value}"></span>
            </div>
        </div>

        <!-- Other Stats -->
        <div class="grid md:grid-cols-2 gap-8 text-lg">

            <div class="bg-white rounded-2xl p-6 shadow-md border border-pink-100">
                <p class="font-semibold text-pink-500">Produk Termahal</p>
                <p class="text-pink-600 font-bold mt-2"
                   th:text="${mostExpensive.name}"></p>
                <p class="text-fuchsia-600 font-extrabold text-xl">
                    Rp <span th:text="${mostExpensive.price}"></span>
                </p>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-md border border-pink-100">
                <p class="font-semibold text-pink-500">Produk Termurah</p>
                <p class="text-pink-600 font-bold mt-2"
                   th:text="${cheapest.name}"></p>
                <p class="text-fuchsia-600 font-extrabold text-xl">
                    Rp <span th:text="${cheapest.price}"></span>
                </p>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-md border border-pink-100">
                <p class="font-semibold text-pink-500">Rata-rata Harga</p>
                <p class="text-fuchsia-600 font-extrabold text-2xl mt-2">
                    Rp <span th:text="${averagePrice}"></span>
                </p>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-md border border-pink-100">
                <p class="font-semibold text-pink-500">
                    Jumlah Produk Stok &lt; 20
                </p>
                <p class="text-pink-600 font-extrabold text-3xl mt-2"
                   th:text="${lowStockCount}">
                </p>
            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
