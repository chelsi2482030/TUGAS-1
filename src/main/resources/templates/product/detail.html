<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>🎀Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<!-- Top Bar -->
<nav class="bg-white/30 backdrop-blur-md shadow-lg mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">

        <h1 class="text-2xl font-extrabold text-white tracking-widest drop-shadow">
            🌸 Product Detail
        </h1>

        <a href="/products"
           class="text-white font-semibold
                  hover:text-pink-100 transition duration-300">
            ← Back
        </a>
    </div>
</nav>

<!-- Main Content -->
<div class="max-w-4xl mx-auto px-6 pb-20">

    <div class="bg-white/80 backdrop-blur-md
                p-12 rounded-3xl shadow-2xl
                border-l-8 border-pink-400">

        <!-- Product Name -->
        <h1 class="text-4xl font-extrabold text-pink-600 mb-8"
            th:text="${product.name}">
        </h1>

        <!-- Category -->
        <p class="mb-4 text-pink-400 text-lg">
            Category:
            <span class="text-pink-600 font-semibold ml-2"
                  th:text="${product.category}"></span>
        </p>

        <!-- Price -->
        <p class="text-4xl font-bold text-fuchsia-600 mb-10"
           th:text="${product.price}">
        </p>

        <!-- Stock -->
        <p class="mb-10 text-lg">
            <span class="text-pink-400">Stock:</span>
            <span class="font-bold text-pink-600 text-2xl ml-2"
                  th:text="${product.stock}">
            </span>
        </p>

        <!-- Button -->
        <a href="/products"
           class="inline-block
                  bg-gradient-to-r from-pink-500 to-fuchsia-500
                  text-white font-bold
                  px-8 py-3 rounded-full shadow-lg
                  hover:shadow-2xl hover:scale-105
                  transition duration-300">
            ← Back to List
        </a>

    </div>

</div>

</body>
</html>
