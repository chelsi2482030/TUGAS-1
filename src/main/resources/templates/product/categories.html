<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>💗Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<div class="max-w-5xl mx-auto mt-20 px-6">

    <!-- Title -->
    <h1 class="text-4xl font-extrabold text-center
               text-white drop-shadow-lg tracking-widest mb-12">
         Daftar Kategori
    </h1>

    <!-- Card List -->
    <ul class="space-y-6">

        <li class="bg-white/80 backdrop-blur-md
                   p-6 rounded-3xl shadow-xl
                   border-l-8 border-pink-400
                   hover:-translate-y-1 hover:shadow-2xl
                   transition duration-300"
            th:each="category : ${categories}">

            <a class="text-pink-600 text-xl font-bold
                      hover:text-fuchsia-500
                      transition duration-300"
               th:href="@{/products/category/{cat}(cat=${category})}"
               th:text="${category}">
            </a>

            <p class="text-sm text-pink-400 mt-2">
                Klik untuk melihat produk dalam kategori ini ✨
            </p>

        </li>

    </ul>

    <!-- Back Button -->
    <div class="text-center">
        <a th:href="@{/products}"
           class="inline-block mt-12
                  bg-gradient-to-r from-pink-500 to-fuchsia-500
                  text-white px-8 py-3 rounded-full
                  font-bold shadow-lg
                  hover:shadow-2xl hover:scale-105
                  transition duration-300">
            ← Back to Products
        </a>
    </div>

</div>

</body>
</html>
