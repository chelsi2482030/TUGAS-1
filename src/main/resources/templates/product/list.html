<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<!-- Top Bar -->
<nav class="bg-white/30 backdrop-blur-md shadow-lg mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">

        <h1 class="text-2xl font-extrabold text-white tracking-widest drop-shadow">
            🌸 Products
        </h1>

        <a href="/"
           class="text-white font-semibold hover:text-pink-100
                  transition duration-300">
            ← Home
        </a>
74
    </div>
</nav>

<!-- Product List -->
<div class="max-w-6xl mx-auto px-6 pb-20 space-y-8">

    <div th:each="product : ${products}"
         class="bg-white/80 backdrop-blur-md
                rounded-3xl shadow-xl p-8
                border-l-8 border-pink-400
                hover:-translate-y-1 hover:shadow-2xl
                transition duration-300">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">

            <!-- LEFT CONTENT -->
            <div>
                <h3 class="text-2xl font-bold text-pink-600 mb-2"
                    th:text="${product.name}">
                </h3>

                <span class="inline-block
                             bg-pink-100 text-pink-600
                             text-sm px-4 py-1 rounded-full font-semibold">
                    <span th:text="${product.category}"></span>
                </span>

                <p class="text-3xl font-extrabold text-fuchsia-600 mt-4"
                   th:text="${product.price}">
                </p>
            </div>

            <!-- RIGHT BUTTON -->
            <div>
                <a th:href="@{/products/{id}(id=${product.id})}"
                   class="inline-block
                          bg-gradient-to-r from-pink-500 to-fuchsia-500
                          text-white font-bold px-8 py-3
                          rounded-full shadow-lg
                          hover:shadow-2xl hover:scale-105
                          transition duration-300">
                    View Detail →
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
