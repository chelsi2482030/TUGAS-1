<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- NAVBAR -->
<nav th:fragment="navbar"
     class="sticky top-0 z-50
            bg-gradient-to-r from-pink-400 via-rose-400 to-fuchsia-500
            shadow-lg">

    <div class="max-w-7xl mx-auto px-6">

        <div class="flex justify-between items-center h-16">

            <!-- Logo -->
            <a th:href="@{/}"
               class="text-2xl font-extrabold text-white tracking-wider
                      hover:opacity-90 transition duration-300">
                🌷 Spring MVC Lab
            </a>

            <!-- Menu -->
            <div class="flex items-center gap-6 text-sm md:text-base">

                <a th:href="@{/}"
                   class="px-3 py-2 rounded-lg text-white font-semibold
                          hover:bg-white/20 transition duration-300">
                    Home
                </a>

                <a th:href="@{/products}"
                   class="px-3 py-2 rounded-lg text-white font-semibold
                          hover:bg-white/20 transition duration-300">
                    Products
                </a>

                <a th:href="@{/about}"
                   class="px-3 py-2 rounded-lg text-white font-semibold
                          hover:bg-white/20 transition duration-300">
                    About
                </a>

                <a th:href="@{/statistics}"
                   class="ml-2 bg-white text-pink-500
                          px-4 py-2 rounded-full font-bold
                          shadow-md hover:shadow-lg
                          hover:scale-105 transition duration-300">
                    Statistics
                </a>

            </div>

        </div>

    </div>

</nav>
<!-- FOOTER -->
<!-- FOOTER -->
<footer th:fragment="footer"
        class="bg-gradient-to-r from-pink-100 via-rose-100 to-fuchsia-100
               text-center py-6 border-t border-pink-200">

    <div class="max-w-7xl mx-auto px-6">

        <p class="text-sm text-pink-500 tracking-wide">
            Spring MVC Lab © 2026 / Web-2 Week 4
        </p>

    </div>

</footer>
</html>
