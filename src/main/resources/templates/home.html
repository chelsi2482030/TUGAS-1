<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>🌸 Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="max-w-6xl mx-auto px-6 py-32 text-center">

    <div class="bg-white/80 backdrop-blur-md
                rounded-3xl shadow-2xl
                p-16 border-l-8 border-pink-400
                inline-block">

        <!-- Title -->
        <h2 class="text-5xl md:text-6xl font-extrabold mb-6
                   text-pink-600 leading-tight">
            Product Management System
        </h2>

        <!-- Subtitle -->
        <p class="text-pink-400 mb-10 text-lg md:text-xl">
            Built with MVC Pattern & Controller Layer
        </p>

        <!-- Buttons -->
        <div class="flex justify-center gap-6 flex-wrap">

            <a th:href="@{/products}"
               class="bg-gradient-to-r from-pink-500 to-fuchsia-500
                      text-white font-bold px-10 py-4
                      rounded-full shadow-lg
                      hover:shadow-2xl hover:scale-105
                      transition duration-300">
                Explore Products →
            </a>

            <a th:href="@{/about}"
               class="bg-pink-100 text-pink-600
                      font-bold px-10 py-4
                      rounded-full shadow-md
                      hover:bg-pink-200 hover:scale-105
                      transition duration-300">
                About Project
            </a>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
