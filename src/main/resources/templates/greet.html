<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>💕Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-200 via-rose-300 to-fuchsia-400
             min-h-screen text-pink-900">

<!-- NAVIGATION -->
<nav class="bg-white/30 backdrop-blur-md shadow-lg mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">

        <h1 class="text-2xl font-extrabold text-white tracking-widest drop-shadow">
            🍧Greeting
        </h1>

        <a th:href="@{/}"
           class="text-white font-semibold hover:text-pink-100
                  transition duration-300">
            ← Home
        </a>

    </div>
</nav>

<div class="max-w-3xl mx-auto mt-24 px-6 text-center">

    <div class="bg-white/80 backdrop-blur-md
                rounded-3xl shadow-2xl p-14
                border-l-8 border-pink-400">

        <!-- Greeting Text -->
        <h1 th:text="${greeting}"
            class="text-4xl md:text-5xl font-extrabold
                   text-pink-600 leading-snug">
            Greeting
        </h1>

        <p class="mt-6 text-pink-400 text-lg">
            ✨ Semoga harimu menyenangkan!
        </p>

        <!-- Button -->
        <a th:href="@{/}"
           class="inline-block mt-12
                  bg-gradient-to-r from-pink-500 to-fuchsia-500
                  text-white font-bold px-8 py-3
                  rounded-full shadow-lg
                  hover:shadow-2xl hover:scale-105
                  transition duration-300">
            ← Back to Home
        </a>

    </div>

</div>

</body>
</html>
